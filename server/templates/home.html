<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retros Against Humanity</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; background: #1a1a2e; color: #eee; }
    h1 { text-align: center; font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #888; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .card { background: #16213e; border-radius: 8px; padding: 1.5rem; }
    .card h2 { margin-top: 0; font-size: 1.25rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 600; font-size: 0.9rem; }
    input, textarea, select { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid #333; background: #0f3460; color: #eee; font-size: 1rem; margin-bottom: 1rem; }
    textarea { min-height: 200px; font-family: inherit; resize: vertical; }
    button { background: #e94560; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-size: 1rem; cursor: pointer; width: 100%; }
    button:hover { background: #c73e54; }
    .join-card input { text-transform: uppercase; font-size: 1.5rem; text-align: center; letter-spacing: 0.3em; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Retros Against Humanity</h1>
  <p class="subtitle">A retrospective game for teams</p>

  <div class="grid">
    <div class="card">
      <h2>Create Session</h2>
      <form method="POST" action="/sessions">
        <label for="host_name">Your Name</label>
        <input type="text" id="host_name" name="host_name" required placeholder="Enter your name">

        <label for="timer">Submission Timer (seconds)</label>
        <input type="number" id="timer" name="timer" value="60" min="10" max="300">

        <label for="cards">Prompt Cards (one per line, use {blank} for blanks)</label>
        <textarea id="cards" name="cards">{{.DefaultCards}}</textarea>

        <button type="submit">Create Session</button>
      </form>
    </div>

    <div class="card join-card" x-data="{ code: '' }">
      <h2>Join Session</h2>
      <label for="code">Session Code</label>
      <input type="text" id="code" maxlength="6" placeholder="ABC123"
        x-model="code"
        @input="code = code.toUpperCase()">
      <button @click="if (code.length === 6) window.location.href = '/sessions/' + code"
        :disabled="code.length !== 6">
        Join
      </button>
    </div>
  </div>
</body>
</html>
