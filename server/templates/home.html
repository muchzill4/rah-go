<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Rah">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Retros Against Humanity - Create or join a session</title>
  <link rel="stylesheet" href="/static/rah.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <meta name="htmx-config" content='{"responseHandling": [{"code":"422", "swap": true},{"code":"204", "swap": false},{"code":"[23]..", "swap": true},{"code":"[45]..", "swap": false, "error":true},{"code":"...", "swap": false}]}'>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-header__link">
      <h1 class="site-header__title">Retros<br>Against<br>Humanity</h1>
    </a>
  </header>

  <div class="landing">
    <div class="landing__cards">
      <section class="card-panel">
        <h2 class="card-panel__title">Create a session</h2>
        <form method="POST" action="/sessions" class="form"
          hx-post="/sessions" hx-target="#create-errors" hx-swap="innerHTML">
          <div class="form__field">
            <label for="host_name" class="form__label">Your name</label>
            <input type="text" id="host_name" name="host_name" placeholder="Enter your name" class="form__input" required>
          </div>
          <div class="form__field">
            <label for="timer" class="form__label">Submission timer (seconds)</label>
            <input type="number" id="timer" name="timer" value="60" min="10" max="300" class="form__input">
          </div>
          <div class="form__field">
            <label for="cards" class="form__label">Cards</label>
            <p class="form__hint">One card per line. Use _ or {blank} for the blank.</p>
            <textarea id="cards" name="cards" class="form__input form__input--textarea" rows="10">{{.DefaultCards}}</textarea>
          </div>
          <div id="create-errors"></div>
          <button type="submit" class="btn btn--primary">Create session</button>
        </form>
      </section>

      <div class="landing__divider">or</div>

      <section class="card-panel">
        <h2 class="card-panel__title">Join a session</h2>
        <p class="card-panel__hint">Ask your host for the session code</p>
        <form method="GET" action="/join" class="form">
          <div class="form__field">
            <label for="code" class="form__label">Session code</label>
            <input type="text" id="code" name="code" maxlength="6" placeholder="ABC123"
              class="form__input form__input--code"
              required pattern="[A-Za-z0-9]{6}">
          </div>
          <button type="submit" class="btn btn--secondary">Join session</button>
        </form>
      </section>
    </div>
  </div>

  <footer class="credits">
    <a href="https://muchzill4.me"><img src="/static/mc4-logo.svg" alt="muchzill4" height="25" class="credits__logo"></a>
    and
    <a href="https://claude.ai"><img src="/static/claude-logo.svg" alt="Claude" height="25" class="credits__logo"></a>
    got inspired by
    <a href="https://www.cardsagainsthumanity.com"><img src="/static/cah-logo.png" alt="Cards Against Humanity" height="25" class="credits__logo"></a>
    and
    <a href="https://www.boxuk.com/insight/retros-against-humanity/"><img src="/static/boxuk-logo.svg" alt="Box UK" height="25" class="credits__logo"></a>
  </footer>
</body>
</html>
