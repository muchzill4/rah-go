<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Rah">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Retros Against Humanity</title>
  <link rel="stylesheet" href="/static/rah.css">
  <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="site-header__link">
      <h1 class="site-header__title">Retros<br>Against<br>Humanity</h1>
    </a>
  </header>

  <div class="landing">
    <div class="landing__cards">
      <section class="card-panel">
        <h2 class="card-panel__title">Create a session</h2>
        <form method="POST" action="/sessions" class="form"
          x-data="{
            validateCards(e) {
              const textarea = e.target.querySelector('textarea');
              const lines = textarea.value.split('\n').filter(l => l.trim());
              const valid = lines.some(l => l.includes('_') || l.includes('{blank}'));
              if (!valid) { e.preventDefault(); alert('At least one card must contain _ or {blank}'); }
            }
          }"
          @submit="validateCards($event)">
          <div class="form__field">
            <label for="host_name" class="form__label">Your name</label>
            <input type="text" id="host_name" name="host_name" placeholder="Enter your name" class="form__input" required>
          </div>
          <div class="form__field">
            <label for="timer" class="form__label">Submission timer (seconds)</label>
            <input type="number" id="timer" name="timer" value="60" min="10" max="300" class="form__input">
          </div>
          <div class="form__field">
            <label for="cards" class="form__label">Cards</label>
            <p class="form__hint">One card per line. Use _ or {blank} for the blank.</p>
            <textarea id="cards" name="cards" class="form__input form__input--textarea" rows="10">{{.DefaultCards}}</textarea>
          </div>
          <button type="submit" class="btn btn--primary">Create session</button>
        </form>
      </section>

      <div class="landing__divider">or</div>

      <section class="card-panel" x-data="{ code: '' }">
        <h2 class="card-panel__title">Join a session</h2>
        <p class="card-panel__hint">Ask your host for the session code</p>
        <form class="form" @submit.prevent="if (code.length === 6) window.location.href = '/sessions/' + code">
          <div class="form__field">
            <label for="code" class="form__label">Session code</label>
            <input type="text" id="code" maxlength="6" placeholder="ABC123"
              class="form__input form__input--code"
              x-model="code"
              @input="code = code.toUpperCase()">
          </div>
          <button type="submit" class="btn btn--secondary" :disabled="code.length !== 6">Join session</button>
        </form>
      </section>
    </div>
  </div>

  <footer class="credits">
    Inspired by
    <a href="https://www.cardsagainsthumanity.com">Cards Against Humanity</a>
    and
    <a href="https://www.boxuk.com/insight/retros-against-humanity/">Box UK</a>
  </footer>
</body>
</html>
